name: Build

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

env:
  itchio_api_key: ${{ secrets.ITCHIO_API_KEY }}
  itchio_project: moomerman/K-9

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: laytan/setup-odin@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          release: nightly

      - name: Install dependencies (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y lld libegl-dev libx11-dev libgl-dev libudev-dev libwayland-dev libasound2-dev

      - name: Compile STB (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: make -C "$HOME/odin/vendor/stb/src"

      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - uses: moomerman/deps@v1.1.0

      - name: Build Desktop
        shell: bash
        run: just build-release

      - name: Upload Desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: bin/K-9*

      - name: Build Web (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: just build-web

      - name: Upload Web artifact (ubuntu)
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: bin/web/

  itch_upload:
    name: itch.io
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: desktop-windows-latest
          path: dist/windows

      - name: Download macOS build
        uses: actions/download-artifact@v4
        with:
          name: desktop-macos-latest
          path: dist/mac

      - name: Download Linux build
        uses: actions/download-artifact@v4
        with:
          name: desktop-ubuntu-latest
          path: dist/linux

      - name: Download Web build
        uses: actions/download-artifact@v4
        with:
          name: web
          path: dist/web

      - name: Restore executable bit on macOS and Linux binaries
        run: chmod +x dist/mac/K-9 dist/linux/K-9

      - name: Install butler
        run: |
          curl -L --retry 5 --retry-delay 10 --retry-all-errors --connect-timeout 30 \
            -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip butler.zip
          chmod +x butler
          ./butler -V

      - name: Push builds to itch.io
        env:
          BUTLER_API_KEY: ${{ env.itchio_api_key }}
        run: |
          ./butler push dist/windows ${{ env.itchio_project }}:windows
          ./butler push dist/mac     ${{ env.itchio_project }}:mac
          ./butler push dist/linux   ${{ env.itchio_project }}:linux
          ./butler push dist/web     ${{ env.itchio_project }}:html5
